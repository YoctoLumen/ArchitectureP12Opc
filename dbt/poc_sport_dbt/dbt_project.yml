  - "target"
  - "dbt_packages"

models:
  poc_sport_dbt:
    staging:
      +schema: staging
      +materialized: incremental
    intermediate:
      +schema: intermediate
      +materialized: incremental
    mart:
      +schema: mart
      +materialized: incremental
